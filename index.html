<!DOCTYPE html>
<html lang="uk">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Home</title>
	<style>
		body {
			opacity: 0;
			visibility: hidden;
			transition: opacity 0.3s ease 0s, visibility 0.3s ease 0s;
		}

		.loaded body {
			opacity: 1;
			visibility: visible;
		}
	</style>
	<script type="module" src="/src/js/app.js" defer></script>
</head>

<body>
	<div class="wrapper">
		{{> header}}
		<main class="page">
			{{> sections/hero}}
			{{> sections/advantages}}
			{{> sections/about}}
			{{> sections/partners}}
			{{> sections/testimonials}}
			{{> sections/cta}}
			{{> sections/app}}
			{{> sections/ps}}
			{{> sections/news}}
		</main>
		{{> footer}}
		{{> fixed-menu}}
	</div>
</body>

</html>
