<section class="app" aria-labelledby="app">
	<div class="app__wrap">
		<div class="app__track">
			<div class="app__content ">
				<div class="app__dark">

					<svg class=" app__decor decor-top " xmlns="http://www.w3.org/2000/svg" fill="inherit" viewBox="0 0 4556 114">
						<path fill="inherit"
							d="M4564.5 76.5v140l-1460.5 7h-557.5L2217.3 253H-498.5l-22-120.7-46.5-72.4 455.2 2.3 525-44.1 518.3 27.1L1542.8 0l674.5 66.7 684.4-54.3L4071 112z" />

					<h2 class="app__title" id="app">
						<span>
							Керуйте
							<strong>
								усіма
							</strong>
						</span>
						<span>
							<strong>
								послугами
							</strong>
						</span>
						<span>
							В особистому
						</span>
						<span>
							кабінеті
						</span>
					</h2>
					<div class="max-lg:hidden app__image">
						<img loading="lazy" src="../img/app/mobile.png" alt="mobile phone with app">
					</div>


					<p class="app__text app__text--1">
						Стан <br> рахунку
					</p>

					<p class="app__text app__text--accent app__text--2">
						Контроль <br> споживання
					</p>
					<p class="app__text app__text--3">
						Оплати та <br> документи
					</p>
					<p class="app__text app__text--4">
						Зв’язок <br> з вашим <br> менеджером
					</p>
				</div>

				<div class="app__end end-app">
					<!-- hidden lg:block -->
					<svg class="  app__decor decor-top " xmlns="http://www.w3.org/2000/svg" fill="inherit" viewBox="0 0 938 114">

								<use href="__spritemap.svg#sprite-arrow-top-right"></use>
							</svg>
						</button>

							<p class="end-app__text">

							</p>
							<svg class="end-app__logo" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 362 59">

									d="M68.5.3H54.9v13.2h-6.3v9.8H55v15c0 10.4 8 18.6 19 18.6l10.6-.1v-10c-9.4 0-16-.9-16-9.9V23.3h16v-9.8h-16z" />

	<div class="lg:hidden app__image app__image--mob">
		<img loading="lazy" src="../img/app/mobile.png" alt="mobile phone with app">
	</div>

	<div class="max-sm:hidden app__progress progress">
		<div class="progress__line"></div>
		<div class="progress__fill"></div>
		<button class="progress__thumb">
			<svg>
				<use href="/__spritemap.svg#sprite-arrow-right"></use>
			</svg>
		</button>
